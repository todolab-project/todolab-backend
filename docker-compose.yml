services:
  mysql:
    image: mysql:8.0
    container_name: todolab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TODOLAB_MYSQL_ROOT_PASSWORD:?TODOLAB_MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${TODOLAB_MYSQL_DATABASE:?TODOLAB_MYSQL_DATABASE is required}
      MYSQL_USER: ${TODOLAB_DB_USERNAME:?TODOLAB_DB_USERNAME is required}
      MYSQL_PASSWORD: ${TODOLAB_DB_PASSWORD:?TODOLAB_DB_PASSWORD is required}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - todolab-mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todolab-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TODOLAB_DB_URL: ${TODOLAB_DB_URL:?TODOLAB_DB_URL is required}
      TODOLAB_DB_USERNAME: ${TODOLAB_DB_USERNAME:?TODOLAB_DB_USERNAME is required}
      TODOLAB_DB_PASSWORD: ${TODOLAB_DB_PASSWORD:?TODOLAB_DB_PASSWORD is required}
      TODOLAB_MAIL_USERNAME: ${TODOLAB_MAIL_USERNAME:?TODOLAB_MAIL_USERNAME is required}
      TODOLAB_MAIL_PASSWORD: ${TODOLAB_MAIL_PASSWORD:?TODOLAB_MAIL_PASSWORD is required}
      TODOLAB_DAILY_SUMMARY_TO: ${TODOLAB_DAILY_SUMMARY_TO:?TODOLAB_DAILY_SUMMARY_TO is required}
      APP_BATCH_SCHEDULER_ENABLED: ${APP_BATCH_SCHEDULER_ENABLED:?APP_BATCH_SCHEDULER_ENABLED is required}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

volumes:
  todolab-mysql-data:
    external: true
    name: todolab-mysql-data

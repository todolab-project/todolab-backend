<!-- src/main/resources/templates/fragments/task-modal.html -->
<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="taskModal">

    <div id="taskModal" class="fixed inset-0 hidden bg-slate-950/45 z-50">
        <div id="taskModalBackdrop" class="w-full h-full flex items-center justify-center p-4">
            <div id="taskModalPanel"
                 class="task-modal-panel bg-white rounded-lg shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">

                <!-- header -->
                <div class="task-modal-header flex items-center justify-between px-5 py-4 border-b shrink-0">
                    <div id="taskModalTitle" class="task-modal-title">항목</div>

                    <!-- X 닫기 -->
                    <button type="button" data-action="close"
                            class="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
                </div>

                <!-- body -->
                <div id="taskModalBody" class="task-modal-body px-5 pb-5 pt-4 overflow-y-auto">

                    <div class="task-modal-field">
                        <div class="task-modal-label">
                            제목<span class="text-red-500">*</span>
                        </div>
                        <input id="tmTitle" type="text"
                               class="task-modal-input w-full border rounded-lg px-3 py-3 text-[16px] font-semibold"
                               placeholder="할 일 또는 일정 제목" />
                    </div>

                    <input id="tmCategory" type="hidden" />

                    <input id="tmUnscheduled" type="checkbox" class="hidden" />

                    <div class="task-modal-block">
                        <div class="task-modal-section-header">
                            <div class="task-modal-section-title-row">
                                <svg class="task-modal-section-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <rect x="5" y="5.5" width="14" height="14" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                                    <path d="M8 3.5v4M16 3.5v4M5 10h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                                <div id="tmDateTitle" class="task-modal-label mb-0">날짜/시간</div>
                                <div id="tmDateHint" class="task-modal-hint">날짜 없으면 할 일로 저장</div>
                            </div>

                            <label id="tmAllDayLabel" class="task-modal-check">
                                <input id="tmAllDay" type="checkbox" />
                                종일
                            </label>
                        </div>

                        <div id="tmScheduleFields" class="task-modal-date-grid">
                            <div class="task-modal-date-field">
                                <div id="tmStartLabel" class="task-modal-sub-label">시작</div>
                                <input id="tmStartAt" type="datetime-local"
                                       class="task-modal-input w-full border rounded-lg px-3 py-3 text-[15px]" />
                            </div>
                            <div class="task-modal-date-field">
                                <div id="tmEndLabel" class="task-modal-sub-label">종료</div>
                                <input id="tmEndAt" type="datetime-local"
                                       class="task-modal-input w-full border rounded-lg px-3 py-3 text-[15px]" />
                            </div>
                        </div>

                        <div id="tmScheduleState" class="task-modal-schedule-state">
                            날짜가 없어 캘린더에 표시되지 않음
                        </div>
                    </div>

                    <div class="task-modal-field">
                        <div class="task-modal-icon-label">
                            <svg class="task-modal-section-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M8 4.5h6l3 3v12H8a2 2 0 0 1-2-2v-11a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                                <path d="M14 4.5v4h4M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                            <div class="task-modal-label mb-0">설명</div>
                        </div>
                        <textarea id="tmDescription"
                                  class="task-modal-input w-full border rounded-lg px-3 py-3 text-[15px]"
                                  placeholder="메모가 필요하면 입력"></textarea>
                    </div>

                    <!-- 메타 -->
                    <div id="tmMeta" class="task-modal-meta hidden">
                        <div class="task-modal-meta-row">
                            <div class="task-modal-meta-label">생성</div>
                            <div id="tmCreatedAt" class="font-semibold">-</div>
                        </div>
                        <div class="task-modal-meta-row">
                            <div class="task-modal-meta-label">수정</div>
                            <div id="tmUpdatedAt" class="font-semibold">-</div>
                        </div>
                    </div>

                </div>

                <!-- footer (닫기 버튼 제거) -->
                <div class="task-modal-footer shrink-0 border-t bg-white">
                    <div class="p-4 flex items-center gap-2">
                        <button id="tmDeleteBtn" type="button"
                                class="task-modal-delete-btn hidden px-4 py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700">
                            삭제
                        </button>

                        <button id="tmPrimaryBtn" type="button"
                                class="app-primary-btn flex-1 py-3">
                            저장
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

</th:block>

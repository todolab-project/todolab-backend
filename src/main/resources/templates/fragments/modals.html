<!-- src/main/resources/templates/fragments/modals.html -->
<th:block th:fragment="modals">

    <!-- 성공 모달 -->
    <div id="successModal"
         class="fixed inset-0 hidden bg-black/40 flex items-center justify-center z-50">
        <div class="bg-white shadow-xl rounded-xl px-6 py-5 text-center animate-fade-in">
            <div class="text-4xl mb-2">🎉</div>
            <div class="text-lg font-bold mb-4">완료되었습니다!</div>
            <button type="button" onclick="closeModal?.()"
                    class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                확인
            </button>
        </div>
    </div>

    <!-- 토스트 -->
    <div id="toast-container"
         class="app-toast-container"
         aria-live="polite"
         aria-atomic="true"></div>

    <div id="appConfirm"
         class="app-confirm hidden"
         role="dialog"
         aria-modal="true"
         aria-labelledby="appConfirmTitle"
         aria-describedby="appConfirmMessage">
        <div class="app-confirm-backdrop" data-confirm-action="cancel"></div>
        <div class="app-confirm-panel" tabindex="-1">
            <div id="appConfirmTitle" class="app-confirm-title">확인</div>
            <div id="appConfirmMessage" class="app-confirm-message"></div>
            <div class="app-confirm-actions">
                <button id="appConfirmCancel" type="button"
                        class="app-confirm-btn app-confirm-cancel"
                        data-confirm-action="cancel">
                    취소
                </button>
                <button id="appConfirmOk" type="button"
                        class="app-confirm-btn app-confirm-ok"
                        data-confirm-action="confirm">
                    확인
                </button>
            </div>
        </div>
    </div>

</th:block>

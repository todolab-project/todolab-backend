<!-- src/main/resources/templates/pages/task/month.html -->
<div th:fragment="content">

    <div id="month-page"
         class="app-page"
         th:attr="data-current-date=${currentDate},
                data-selected-date=${selectedDate},
                data-month-label=${monthLabel},
                data-month-start=${monthStart}">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    Calendar
                </div>

                <div id="monthRangeText"
                     class="app-page-subtitle"
                     th:text="${monthRange}">2026-02</div>
            </div>

            <div class="flex items-center gap-2">
                <div class="inline-flex items-center rounded-lg border border-slate-200 bg-white p-1 shadow-sm">
                    <a th:href="'/tasks/week?date=' + ${selectedDate}"
                       class="px-3 py-1.5 rounded-md text-[12px] font-extrabold text-slate-700 hover:bg-slate-100 active:scale-[0.98]">
                        주간
                    </a>

                    <span class="px-3 py-1.5 rounded-md text-[12px] font-extrabold
                       bg-blue-600 text-white">
            월간
          </span>
                </div>
            </div>
        </div>

        <!-- 월 캘린더 -->
        <div class="mt-4 shrink-0">
            <div class="relative">

                <!-- 좌/우 버튼 -->
                <button type="button"
                        id="monthPrevHint"
                        class="absolute left-2 top-1/2 -translate-y-1/2 z-10
                       w-9 h-9 p-0 rounded-lg
                       bg-white/80 border border-gray-200
                       shadow-[0_10px_24px_rgba(17,24,39,0.06)]
                       flex items-center justify-center
                       text-gray-400 hover:text-gray-700 hover:bg-white
                       active:scale-[0.98]"
                        aria-label="지난달">
                    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                              d="M12.78 15.53a.75.75 0 0 1-1.06 0l-5-5a.75.75 0 0 1 0-1.06l5-5a.75.75 0 1 1 1.06 1.06L8.31 10l4.47 4.47a.75.75 0 0 1 0 1.06z"
                              clip-rule="evenodd"/>
                    </svg>
                </button>

                <button type="button"
                        id="monthNextHint"
                        class="absolute right-2 top-1/2 -translate-y-1/2 z-10
                       w-9 h-9 p-0 rounded-lg
                       bg-white/80 border border-gray-200
                       shadow-[0_10px_24px_rgba(17,24,39,0.06)]
                       flex items-center justify-center
                       text-gray-400 hover:text-gray-700 hover:bg-white
                       active:scale-[0.98]"
                        aria-label="다음달">
                    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                              d="M7.22 4.47a.75.75 0 0 1 1.06 0l5 5a.75.75 0 0 1 0 1.06l-5 5a.75.75 0 1 1-1.06-1.06L11.69 10 7.22 5.53a.75.75 0 0 1 0-1.06z"
                              clip-rule="evenodd"/>
                    </svg>
                </button>

                <!-- 가장자리 페이드 -->
                <div class="pointer-events-none absolute left-0 top-0 h-full w-12
                    bg-gradient-to-r from-[#f3f5f7] to-transparent z-[5]"></div>
                <div class="pointer-events-none absolute right-0 top-0 h-full w-12
                    bg-gradient-to-l from-[#f3f5f7] to-transparent z-[5]"></div>

                <!-- 컨텐츠 -->
                <div class="px-12">

                    <!-- 요일 헤더 -->
                    <div class="grid grid-cols-7 w-full justify-items-center">
                        <div class="text-[12px] font-extrabold text-red-400">일</div>
                        <div class="text-[12px] font-extrabold text-gray-400">월</div>
                        <div class="text-[12px] font-extrabold text-gray-400">화</div>
                        <div class="text-[12px] font-extrabold text-gray-400">수</div>
                        <div class="text-[12px] font-extrabold text-gray-400">목</div>
                        <div class="text-[12px] font-extrabold text-gray-400">금</div>
                        <div class="text-[12px] font-extrabold text-blue-400">토</div>
                    </div>

                    <!-- ✅ 날짜 그리드: monthDays 길이(weeks*7)만큼만 렌더 -->
                    <div id="monthGrid"
                         class="mt-3 grid grid-cols-7 gap-y-2 w-full select-none"
                         style="touch-action: pan-x;">
                        <div th:each="c : ${monthDays}" class="flex flex-col items-center">

                            <a th:href="'/tasks/month?date=' + ${c.date}"
                               th:attr="data-date=${c.date}"
                               class="w-[40px] h-[40px] rounded-full flex items-center justify-center
                        font-black text-[15px] transition
                        hover:bg-gray-900/5 active:scale-[0.98]"
                               th:classappend="${
                    (c.date.equals(selectedDate)) ?
                      ' bg-blue-600 text-white shadow-[0_8px_16px_rgba(37,99,235,0.14)] ring-2 ring-blue-200/30'
                      : (c.inMonth ? ' text-gray-900' : ' text-gray-300')
                 }"
                               th:text="${c.date.dayOfMonth}">
                                1
                            </a>

                            <div class="calendar-day-dots">
                                <span th:if="${c.tasks != null and !c.tasks.isEmpty()}"
                                      class="calendar-day-dot calendar-day-dot-task"></span>
                                <span th:if="${c.hasDoneTasks}"
                                      class="calendar-day-dot calendar-day-dot-done"></span>
                                <span th:if="${c.hasStaleTasks}"
                                      class="calendar-day-dot calendar-day-dot-stale"></span>
                                <span th:if="${c.ddayGoals != null and !c.ddayGoals.isEmpty()}"
                                      class="calendar-day-dot calendar-day-dot-dday"></span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="calendar-dot-legend"
             aria-label="Calendar 표시 필터">
            <button type="button"
                    class="calendar-dot-legend-item calendar-dot-filter-toggle"
                    data-calendar-filter="task"
                    aria-pressed="true">
                <span class="calendar-day-dot calendar-day-dot-task" aria-hidden="true"></span>
                <span>일정</span>
            </button>
            <button type="button"
                    class="calendar-dot-legend-item calendar-dot-filter-toggle"
                    data-calendar-filter="done"
                    aria-pressed="true">
                <span class="calendar-day-dot calendar-day-dot-done" aria-hidden="true"></span>
                <span>완료</span>
            </button>
            <button type="button"
                    class="calendar-dot-legend-item calendar-dot-filter-toggle"
                    data-calendar-filter="stale"
                    aria-pressed="true">
                <span class="calendar-day-dot calendar-day-dot-stale" aria-hidden="true"></span>
                <span>미룸</span>
            </button>
            <button type="button"
                    class="calendar-dot-legend-item calendar-dot-filter-toggle"
                    data-calendar-filter="dday"
                    aria-pressed="true">
                <span class="calendar-day-dot calendar-day-dot-dday" aria-hidden="true"></span>
                <span>D-Day</span>
            </button>
        </div>

        <!-- 아래 스크롤 -->
        <div class="app-scroll touch-pan-y">
            <div id="month-error" class="calendar-error hidden" role="alert" aria-live="polite">
                <div class="calendar-error-icon" aria-hidden="true">!</div>
                <div class="calendar-error-content">
                    <div class="calendar-error-title">일정을 불러오지 못했어요</div>
                    <div id="month-error-message" class="calendar-error-message"></div>
                </div>
                <button id="month-retry" type="button" class="calendar-error-retry">
                    다시 시도
                </button>
            </div>

            <div id="month-empty"
                 class="app-empty hidden mt-6">
                <div class="app-empty-icon">
                    □
                </div>

                <div class="app-empty-title">
                    등록된 일정이 없어요
                </div>

                <div class="app-empty-copy">
                    선택한 날짜에 할 일이나 캘린더 일정을 추가해보세요.
                </div>

                <div class="app-empty-actions">
                    <button type="button"
                            class="app-empty-action"
                            data-action="open-create">
                        일정 추가하기
                    </button>
                </div>
            </div>

            <div id="month-card" class="mt-4 hidden">
                <div class="mb-3 px-1">
                    <div id="month-selected-date-title"
                         class="text-[15px] font-black text-gray-900">선택한 날짜의 할 일</div>
                    <div id="month-selected-date-text"
                         class="mt-1 text-[12px] font-semibold text-gray-500"
                         th:text="${selectedDate}">2026-05-30</div>
                </div>
                <div class="task-card">
                    <div id="month-list" class="space-y-0"></div>
                </div>
            </div>

            <section th:with="selectedCell=${monthDays.?[date.equals(selectedDate)].isEmpty() ? null : monthDays.?[date.equals(selectedDate)][0]}"
                     th:if="${selectedCell != null and selectedCell.ddayGoals != null and !selectedCell.ddayGoals.isEmpty()}"
                     class="mt-8">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">D-Day</div>
                        <div class="app-section-subtitle">선택한 날짜의 목표예요</div>
                    </div>
                    <div class="app-pill"
                         th:text="${selectedCell.ddayGoals.size()} + '개'">1개</div>
                </div>

                <div class="mt-4 space-y-3">
                    <a th:each="goal : ${selectedCell.ddayGoals}"
                       th:href="@{/tasks/dday}"
                       class="block rounded-lg border border-slate-200 bg-white px-4 py-4 shadow-sm">
                        <div class="flex items-center justify-between gap-3">
                            <div class="min-w-0">
                                <div class="truncate text-[15px] font-black text-gray-900"
                                     th:text="${goal.title}">정보처리기사</div>
                                <div class="mt-1 text-[12px] font-semibold text-gray-500"
                                     th:text="${goal.targetDate}">2026-06-10</div>
                            </div>
                            <div class="shrink-0 text-[14px] font-black text-blue-700"
                                 th:text="${goal.label()}">D-Day</div>
                        </div>
                    </a>
                </div>
            </section>

            <section class="app-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">완료한 일</div>
                        <div class="app-section-subtitle">선택한 날짜에 끝낸 일이에요</div>
                    </div>
                    <div id="month-done-count"
                         class="app-pill app-pill-green">
                        0개
                    </div>
                </div>

                <div id="month-done-empty"
                     class="app-empty mt-4">
                    아직 완료한 일이 없어요
                </div>

                <div id="month-done-card" class="mt-4 hidden">
                    <div id="month-done-list" class="space-y-3"></div>
                </div>
            </section>

            <div class="h-10"></div>
        </div>

    </div>

    <script defer src="/js/month.js"></script>
</div>

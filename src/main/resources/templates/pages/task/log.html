<!-- src/main/resources/templates/pages/task/log.html -->
<div th:fragment="content">

    <div id="log-page"
         class="px-4 pb-24 max-w-3xl mx-auto h-full flex flex-col"
         th:attr="data-date=${date}">

        <div class="mt-6 flex items-center justify-between px-1 shrink-0">
            <div>
                <div class="inline-flex items-center gap-2 text-[16px] font-black text-gray-900 tracking-tight">
                    <span class="text-[16px] leading-none">✓</span>
                    <span>Log</span>
                </div>

                <div id="logDateText"
                     class="mt-1 text-[12px] font-semibold text-gray-500"
                     th:text="${date}">2026-05-30</div>
            </div>

            <div id="log-count"
                 class="self-center text-[12px] font-extrabold text-gray-900
                        bg-emerald-50 border border-emerald-100
                        px-3 py-1.5 rounded-full hidden">
            </div>
        </div>

        <div class="mt-4 border-t border-gray-200 shrink-0"></div>

        <div class="mt-4 grid grid-cols-3 gap-2 shrink-0">
            <a id="logPrevLink"
               class="rounded-xl border border-gray-200 bg-white px-3 py-2 text-center text-[13px] font-extrabold text-gray-700 hover:bg-gray-50"
               href="#">이전</a>
            <a id="logTodayLink"
               class="rounded-xl border border-gray-900 bg-gray-900 px-3 py-2 text-center text-[13px] font-extrabold text-white"
               href="/tasks/log">오늘</a>
            <a id="logNextLink"
               class="rounded-xl border border-gray-200 bg-white px-3 py-2 text-center text-[13px] font-extrabold text-gray-700 hover:bg-gray-50"
               href="#">다음</a>
        </div>

        <div class="flex-1 min-h-0 overflow-y-auto">
            <div id="log-loading"
                 class="mt-6 text-gray-500 text-sm">
                불러오는 중...
            </div>

            <div id="log-error"
                 class="mt-6 text-red-600 text-sm hidden"></div>

            <div id="log-empty"
                 class="hidden mt-16 flex flex-col items-center justify-center text-center select-none">
                <div class="w-14 h-14 rounded-2xl bg-white/60 border border-gray-200
                      flex items-center justify-center shadow-sm">
                    <span class="text-2xl">✓</span>
                </div>

                <div class="mt-5 text-2xl font-extrabold text-gray-800">
                    완료한 일이 없어요
                </div>

                <div class="mt-3 text-base text-gray-500 font-semibold">
                    완료한 일은 날짜별로 여기에 남아요
                </div>
            </div>

            <div id="log-card" class="mt-6 hidden">
                <div id="log-list" class="space-y-3"></div>
            </div>

            <div class="h-10"></div>
        </div>
    </div>
</div>

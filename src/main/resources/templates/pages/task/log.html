<!-- src/main/resources/templates/pages/task/log.html -->
<div th:fragment="content">

    <div id="log-page"
         class="app-page"
         th:attr="data-date=${date}">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    Log
                </div>

                <div id="logDateText"
                     class="app-page-subtitle"
                     th:text="${date}">2026-05-30</div>
            </div>

            <div id="log-count"
                 class="app-pill app-pill-green hidden">
            </div>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-2 shrink-0">
            <a id="logPrevLink"
               class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-center text-[13px] font-extrabold text-slate-700 hover:bg-slate-50"
               href="#">이전</a>
            <a id="logTodayLink"
               class="rounded-lg border border-blue-600 bg-blue-600 px-3 py-2 text-center text-[13px] font-extrabold text-white"
               href="/tasks/log">오늘</a>
            <a id="logNextLink"
               class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-center text-[13px] font-extrabold text-slate-700 hover:bg-slate-50"
               href="#">다음</a>
        </div>

        <div class="app-scroll">
            <div id="log-loading"
                 class="mt-6 text-gray-500 text-sm">
                불러오는 중...
            </div>

            <div id="log-error"
                 class="mt-6 text-red-600 text-sm hidden"></div>

            <div id="log-empty"
                 class="hidden mt-16 flex flex-col items-center justify-center text-center select-none">
                <div class="w-14 h-14 rounded-lg bg-white border border-slate-200
                      flex items-center justify-center shadow-sm">
                    <span class="text-2xl">✓</span>
                </div>

                <div class="mt-5 text-2xl font-extrabold text-gray-800">
                    완료한 일이 없어요
                </div>

                <div class="mt-3 text-base text-gray-500 font-semibold">
                    완료한 일은 날짜별로 여기에 남아요
                </div>
            </div>

            <div id="log-card" class="mt-6 hidden">
                <div id="log-list" class="space-y-3"></div>
            </div>

            <div class="h-10"></div>
        </div>
    </div>
</div>

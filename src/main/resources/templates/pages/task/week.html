<!-- src/main/resources/templates/pages/task/week.html -->
<div th:fragment="content">

    <div id="week-page"
         class="app-page"
         th:attr="data-current-date=${currentDate},
                data-selected-date=${selectedDate},
                data-week-start=${weekStart},
                data-week-end=${weekEnd}">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    Calendar
                </div>

                <div id="weekRangeText"
                     class="app-page-subtitle"
                     th:text="${weekRange}">2026-02-01 ~ 2026-02-07
                </div>
            </div>

            <div class="inline-flex items-center rounded-lg border border-slate-200 bg-white p-1 shadow-sm">
                <span class="px-3 py-1.5 rounded-md text-[12px] font-extrabold
                     bg-blue-600 text-white">
                    주간
                </span>

                <a th:href="'/tasks/month?date=' + ${selectedDate}"
                   class="px-3 py-1.5 rounded-md text-[12px] font-extrabold text-slate-700 hover:bg-slate-100 active:scale-[0.98]">
                    월간
                </a>
            </div>
        </div>

        <!-- 요일/일자 바 -->
        <div class="mt-4 shrink-0">
            <div class="relative">

                <!-- 좌/우 버튼 -->
                <button type="button"
                        id="weekPrevHint"
                        class="absolute left-2 top-1/2 -translate-y-1/2 z-10
                       w-9 h-9 p-0 rounded-lg
                       bg-white/80 border border-gray-200
                       shadow-[0_10px_24px_rgba(17,24,39,0.06)]
                       flex items-center justify-center
                       text-gray-400 hover:text-gray-700 hover:bg-white
                       active:scale-[0.98]"
                        aria-label="지난주">
                    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                              d="M12.78 15.53a.75.75 0 0 1-1.06 0l-5-5a.75.75 0 0 1 0-1.06l5-5a.75.75 0 1 1 1.06 1.06L8.31 10l4.47 4.47a.75.75 0 0 1 0 1.06z"
                              clip-rule="evenodd"/>
                    </svg>
                </button>

                <button type="button"
                        id="weekNextHint"
                        class="absolute right-2 top-1/2 -translate-y-1/2 z-10
                       w-9 h-9 p-0 rounded-lg
                       bg-white/80 border border-gray-200
                       shadow-[0_10px_24px_rgba(17,24,39,0.06)]
                       flex items-center justify-center
                       text-gray-400 hover:text-gray-700 hover:bg-white
                       active:scale-[0.98]"
                        aria-label="다음주">
                    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                              d="M7.22 4.47a.75.75 0 0 1 1.06 0l5 5a.75.75 0 0 1 0 1.06l-5 5a.75.75 0 1 1-1.06-1.06L11.69 10 7.22 5.53a.75.75 0 0 1 0-1.06z"
                              clip-rule="evenodd"/>
                    </svg>
                </button>

                <!-- 가장자리 페이드 -->
                <div class="pointer-events-none absolute left-0 top-0 h-full w-12
                    bg-gradient-to-r from-[#f3f5f7] to-transparent z-[5]"></div>
                <div class="pointer-events-none absolute right-0 top-0 h-full w-12
                    bg-gradient-to-l from-[#f3f5f7] to-transparent z-[5]"></div>

                <!-- strip -->
                <div id="weekStrip"
                     class="w-full select-none touch-pan-y cursor-grab active:cursor-grabbing px-12">
                    <div class="grid grid-cols-7 w-full justify-items-center">

                        <div th:each="ds, stat : ${weeklyTasks}"
                             class="flex flex-col items-center">

                            <div class="text-[13px] font-extrabold tracking-tight"
                                 th:classappend="${stat.index == 0} ? ' text-red-400' : (${stat.index == 6} ? ' text-blue-400' : ' text-gray-400')"
                                 th:text="${ds.dayLabel}">일
                            </div>

                            <a th:href="'/tasks/week?date=' + ${ds.date}"
                               th:attr="data-date=${ds.date}"
                               class="mt-2 w-[40px] h-[40px] rounded-full flex items-center justify-center
                        font-black text-[16px] transition
                        hover:bg-gray-900/5 active:scale-[0.98]
                        text-gray-900"
                               th:classappend="${ds.date.equals(selectedDate)} ?
                    ' bg-blue-600 text-white shadow-[0_8px_16px_rgba(37,99,235,0.14)] ring-2 ring-blue-200/30'
                    : ''"
                               th:text="${ds.date.dayOfMonth}">
                                25
                            </a>

                            <div class="calendar-day-dots">
                                <span th:if="${ds.tasks != null and !ds.tasks.isEmpty()}"
                                      class="calendar-day-dot calendar-day-dot-task"></span>
                                <span th:if="${ds.hasDoneTasks}"
                                      class="calendar-day-dot calendar-day-dot-done"></span>
                                <span th:if="${ds.hasStaleTasks}"
                                      class="calendar-day-dot calendar-day-dot-stale"></span>
                                <span th:if="${ds.ddayGoals != null and !ds.ddayGoals.isEmpty()}"
                                      class="calendar-day-dot calendar-day-dot-dday"></span>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 아래 스크롤 -->
        <div class="app-scroll touch-pan-y">
            <div id="week-error" class="calendar-error hidden" role="alert" aria-live="polite">
                <div class="calendar-error-icon" aria-hidden="true">!</div>
                <div class="calendar-error-content">
                    <div class="calendar-error-title">일정을 불러오지 못했어요</div>
                    <div id="week-error-message" class="calendar-error-message"></div>
                </div>
                <button id="week-retry" type="button" class="calendar-error-retry">
                    다시 시도
                </button>
            </div>

            <div id="week-empty"
                 class="hidden mt-14 flex flex-col items-center justify-center text-center select-none">
                <div class="w-14 h-14 rounded-lg bg-white border border-gray-200
                    flex items-center justify-center shadow-sm">
                    <span class="text-2xl text-slate-500">□</span>
                </div>

                <div class="mt-5 text-2xl font-extrabold text-gray-800">
                    등록된 일정이 없어요
                </div>

                <div class="mt-3 text-base text-gray-500 font-semibold">
                    선택한 날짜에 일정을 추가해보세요
                </div>

                <div class="mt-4 text-sm font-semibold text-gray-500">
                    오른쪽 아래 <span class="font-extrabold text-gray-700">+</span> 버튼으로 바로 추가할 수 있어요
                </div>
            </div>

            <div id="week-card" class="mt-4 hidden">
                <div class="mb-3 px-1">
                    <div class="text-[15px] font-black text-gray-900">선택한 날짜의 일정</div>
                    <div class="mt-1 text-[12px] font-semibold text-gray-500" th:text="${selectedDate}">2026-05-30</div>
                </div>
                <div class="task-card">
                    <div id="week-list" class="space-y-0"></div>
                </div>
            </div>

            <section th:if="${selectedSchedule != null and selectedSchedule.ddayGoals != null and !selectedSchedule.ddayGoals.isEmpty()}"
                     class="mt-8">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">D-Day</div>
                        <div class="app-section-subtitle">선택한 날짜의 목표예요</div>
                    </div>
                    <div class="app-pill"
                         th:text="${selectedSchedule.ddayGoals.size()} + '개'">1개</div>
                </div>

                <div class="mt-4 space-y-3">
                    <a th:each="goal : ${selectedSchedule.ddayGoals}"
                       th:href="@{/tasks/dday}"
                       class="block rounded-lg border border-slate-200 bg-white px-4 py-4 shadow-sm">
                        <div class="flex items-center justify-between gap-3">
                            <div class="min-w-0">
                                <div class="truncate text-[15px] font-black text-gray-900"
                                     th:text="${goal.title}">정보처리기사</div>
                                <div class="mt-1 text-[12px] font-semibold text-gray-500"
                                     th:text="${goal.targetDate}">2026-06-10</div>
                            </div>
                            <div class="shrink-0 text-[14px] font-black text-blue-700"
                                 th:text="${goal.label()}">D-Day</div>
                        </div>
                    </a>
                </div>
            </section>

            <section class="app-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">완료한 일</div>
                        <div class="app-section-subtitle">선택한 날짜에 끝낸 일이에요</div>
                    </div>
                    <div id="week-done-count"
                         class="app-pill app-pill-green">
                        0개
                    </div>
                </div>

                <div id="week-done-empty"
                     class="app-empty mt-4">
                    아직 완료한 일이 없어요
                </div>

                <div id="week-done-card" class="mt-4 hidden">
                    <div id="week-done-list" class="space-y-3"></div>
                </div>
            </section>

            <div class="h-10"></div>
        </div>

    </div>

    <script defer src="/js/week.js"></script>
</div>

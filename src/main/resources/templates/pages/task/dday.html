<!-- src/main/resources/templates/pages/task/dday.html -->
<div th:fragment="content">
    <div id="dday-page" class="app-page">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    D-Day
                </div>
                <div class="app-page-subtitle">
                    가까운 목표를 한눈에 봐요
                </div>
            </div>
        </div>

        <div class="app-scroll">
            <form id="ddayForm"
                  autocomplete="off">
                <input id="ddayTitle"
                       type="text"
                       maxlength="50"
                       class="app-input min-w-0 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none"
                       placeholder="목표 이름" />
                <input id="ddayTargetDate"
                       type="date"
                       class="app-input bg-white px-3 py-3 text-[14px] font-bold text-gray-900 outline-none" />
                <button id="ddaySubmit"
                        type="submit"
                        class="app-primary-btn col-span-2 px-4 py-3 text-[14px] disabled:opacity-50">
                    추가
                </button>
            </form>

            <div id="dday-loading" class="mt-6 text-gray-500 text-sm">불러오는 중...</div>
            <div id="dday-error" class="mt-6 text-red-600 text-sm hidden"></div>

            <section id="dday-empty"
                     class="app-empty hidden mt-6 text-left">
                <div class="text-[18px] font-black text-gray-900">아직 목표가 없어요</div>
                <div class="mt-2 text-[14px] font-semibold leading-6 text-gray-500">
                    시험, 마감, 제출일처럼 날짜가 중요한 일을 여기에 모아둘 수 있어요.
                </div>
            </section>

            <section id="dday-card" class="mt-6 hidden">
                <div class="app-section-header">
                    <div class="app-section-title">목표</div>
                    <div id="dday-count"
                         class="app-pill app-pill-blue">
                        0개
                    </div>
                </div>

                <div id="dday-list" class="mt-4 space-y-3"></div>
            </section>

            <div class="h-10"></div>
        </div>
    </div>
</div>

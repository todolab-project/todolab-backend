<!-- src/main/resources/templates/pages/task/dday.html -->
<div th:fragment="content">
    <div id="dday-page" class="px-4 pb-24 max-w-3xl mx-auto h-full flex flex-col">

        <div class="mt-6 flex items-center justify-between px-1 shrink-0">
            <div>
                <div class="inline-flex items-center gap-2 text-[16px] font-black text-gray-900 tracking-tight">
                    <span class="text-[16px] leading-none">🎯</span>
                    <span>D-Day</span>
                </div>
                <div class="mt-1 text-[12px] font-semibold text-gray-500">
                    가까운 목표를 한눈에 봐요
                </div>
            </div>
        </div>

        <div class="mt-4 border-t border-gray-200 shrink-0"></div>

        <div class="flex-1 min-h-0 overflow-y-auto">
            <form id="ddayForm"
                  class="mt-5 grid grid-cols-[1fr_auto] gap-2"
                  autocomplete="off">
                <input id="ddayTitle"
                       type="text"
                       maxlength="50"
                       class="min-w-0 rounded-xl border border-gray-200 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none focus:border-gray-900"
                       placeholder="목표 이름" />
                <input id="ddayTargetDate"
                       type="date"
                       class="rounded-xl border border-gray-200 bg-white px-3 py-3 text-[14px] font-bold text-gray-900 outline-none focus:border-gray-900" />
                <button id="ddaySubmit"
                        type="submit"
                        class="col-span-2 rounded-xl bg-gray-900 px-4 py-3 text-[14px] font-extrabold text-white disabled:opacity-50">
                    추가
                </button>
            </form>

            <div id="dday-loading" class="mt-6 text-gray-500 text-sm">불러오는 중...</div>
            <div id="dday-error" class="mt-6 text-red-600 text-sm hidden"></div>

            <section id="dday-empty"
                     class="hidden mt-6 rounded-2xl border border-dashed border-gray-200 bg-white/70 px-5 py-6">
                <div class="text-[18px] font-black text-gray-900">아직 목표가 없어요</div>
                <div class="mt-2 text-[14px] font-semibold leading-6 text-gray-500">
                    시험, 마감, 제출일처럼 날짜가 중요한 일을 여기에 모아둘 수 있어요.
                </div>
            </section>

            <section id="dday-card" class="mt-6 hidden">
                <div class="flex items-center justify-between px-1">
                    <div class="text-[15px] font-black text-gray-900">목표</div>
                    <div id="dday-count"
                         class="text-[12px] font-extrabold text-gray-900 bg-indigo-50 border border-indigo-100 px-3 py-1.5 rounded-full">
                        0개
                    </div>
                </div>

                <div id="dday-list" class="mt-4 space-y-3"></div>
            </section>

            <div class="h-10"></div>
        </div>
    </div>
</div>

<!-- src/main/resources/templates/pages/task/unscheduled.html -->
<div id="unscheduled-page"
     th:fragment="content"
     class="app-page">

    <div class="app-page-header">
        <div>
            <div class="app-page-title">Inbox</div>
            <div class="app-page-subtitle">아직 날짜를 정하지 않은 할 일이에요</div>
        </div>

        <div id="unscheduled-count"
             class="app-pill hidden">
        </div>
    </div>

    <div class="app-scroll">

        <form id="inboxQuickForm"
              class="quick-capture-form"
              autocomplete="off">
            <input id="inboxQuickTitle"
                   type="text"
                   maxlength="30"
                   class="app-input min-w-0 flex-1 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none"
                   placeholder="생각난 할 일을 바로 기록" />
            <button id="inboxQuickSubmit"
                    type="submit"
                    class="app-primary-btn quick-capture-submit">
                기록
            </button>
        </form>

        <!-- 로딩 / 에러 -->
        <div id="unscheduled-loading"
             class="mt-6 text-gray-500 text-sm">
            불러오는 중...
        </div>

        <div id="unscheduled-error"
             class="mt-6 text-red-600 text-sm hidden">
        </div>

        <!-- ✅ Empty State (0개여도 헤더는 유지됨) -->
        <div id="unscheduled-empty"
             class="hidden mt-16 flex flex-col items-center justify-center text-center select-none">
            <div class="w-14 h-14 rounded-lg bg-white border border-slate-200
                        flex items-center justify-center shadow-sm">
                <span class="text-2xl text-slate-500">+</span>
            </div>

            <div class="mt-5 text-2xl font-extrabold text-gray-800">
                Inbox가 비어 있어요
            </div>

            <div class="mt-3 text-base text-gray-500 font-semibold">
                빠르게 기록한 할 일을 여기에 모아둘 수 있어요
            </div>

            <!-- CTA -->
            <div class="mt-4 text-sm font-semibold text-gray-500">
                위 입력창에서 바로 기록할 수 있어요
            </div>
        </div>

        <!-- ✅ 리스트 카드 (unscheduled.js가 제어) -->
        <div id="unscheduled-card" class="mt-6 hidden">
            <div id="unscheduled-list" class="space-y-4"></div>
        </div>

        <!-- 하단 여유 (탭바와 간격) -->
        <div class="h-10"></div>
    </div>

</div>

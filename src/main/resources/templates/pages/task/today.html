<!-- src/main/resources/templates/pages/task/today.html -->
<div th:fragment="content">

    <div id="today-page"
         class="px-4 pb-24 max-w-3xl mx-auto h-full flex flex-col"
         th:attr="data-date=${date}">

        <!-- ✅ 상단 타이틀(항상 유지 / 중앙 정렬 기준) -->
        <div class="mt-6 flex items-center justify-between px-1 shrink-0">
            <div>
                <div class="inline-flex items-center gap-2 text-[16px] font-black text-gray-900 tracking-tight">
                    <span class="text-[16px] leading-none">✨</span>
                    <span>Today</span>
                </div>

                <!-- 날짜: JS가 요일 포함으로 덮어씀 -->
                <div id="todayDateText"
                     class="mt-1 text-[12px] font-semibold text-gray-500"
                     th:text="${date}">2026-01-31</div>
            </div>

            <!-- 우측 개수 pill -->
            <div id="today-count"
                 class="self-center text-[12px] font-extrabold text-gray-900
                        bg-gray-900/5 border border-gray-200
                        px-3 py-1.5 rounded-full hidden">
            </div>
        </div>

        <!-- ✅ 헤더 아래 구분선 -->
        <div class="mt-4 border-t border-gray-200 shrink-0"></div>

        <!-- ✅ 아래 내용만 스크롤 -->
        <div class="flex-1 min-h-0 overflow-y-auto">

            <form id="todayQuickForm"
                  class="mt-5 flex items-center gap-2"
                  autocomplete="off">
                <input id="todayQuickTitle"
                       type="text"
                       maxlength="30"
                       class="min-w-0 flex-1 rounded-xl border border-gray-200 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none focus:border-gray-900"
                       placeholder="생각난 할 일을 바로 기록" />
                <button id="todayQuickSubmit"
                        type="submit"
                        class="shrink-0 rounded-xl bg-gray-900 px-4 py-3 text-[14px] font-extrabold text-white disabled:opacity-50">
                    기록
                </button>
            </form>

            <!-- 로딩 / 에러 -->
            <div id="today-loading"
                 class="mt-6 text-gray-500 text-sm">
                불러오는 중...
            </div>

            <div id="today-error"
                 class="mt-6 text-red-600 text-sm hidden"></div>

            <!-- Empty State -->
            <div id="today-empty"
                 class="hidden mt-16 flex flex-col items-center justify-center text-center select-none">
                <div class="w-14 h-14 rounded-2xl bg-white/60 border border-gray-200
                      flex items-center justify-center shadow-sm">
                    <span class="text-2xl">🗓️</span>
                </div>

                <div class="mt-5 text-2xl font-extrabold text-gray-800">
                    오늘 할 일이 없어요
                </div>

                <div class="mt-3 text-base text-gray-500 font-semibold">
                    아래 기록함에서 오늘 할 일을 골라보세요
                </div>
            </div>

            <!-- ✅ 리스트 카드 (today.js가 제어) -->
            <div id="today-card" class="mt-6 hidden">
                <div id="today-list" class="space-y-3"></div>
            </div>

            <section class="mt-8">
                <div class="flex items-center justify-between px-1">
                    <div>
                        <div class="text-[16px] font-black text-gray-900">아직 고르지 않은 일</div>
                        <div class="mt-1 text-[12px] font-semibold text-gray-500">기록해둔 일 중 오늘 할 일을 골라요</div>
                    </div>
                    <div id="today-inbox-count"
                         class="text-[12px] font-extrabold text-gray-900 bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-full">
                        0개
                    </div>
                </div>

                <div id="today-inbox-empty"
                     class="mt-4 rounded-xl border border-dashed border-gray-200 bg-white/60 px-4 py-5 text-center text-[14px] font-semibold text-gray-500">
                    기록함이 비어 있어요
                </div>

                <div id="today-inbox-card" class="mt-4 hidden">
                    <div id="today-inbox-list" class="space-y-4"></div>
                </div>
            </section>

            <section class="mt-8">
                <div class="flex items-center justify-between px-1">
                    <div>
                        <div class="text-[16px] font-black text-gray-900">오늘 완료한 일</div>
                        <div class="mt-1 text-[12px] font-semibold text-gray-500">완료하면 여기에 쌓여요</div>
                    </div>
                    <div id="today-done-count"
                         class="text-[12px] font-extrabold text-gray-900 bg-emerald-50 border border-emerald-100 px-3 py-1.5 rounded-full">
                        0개
                    </div>
                </div>

                <div id="today-done-empty"
                     class="mt-4 rounded-xl border border-dashed border-gray-200 bg-white/60 px-4 py-5 text-center text-[14px] font-semibold text-gray-500">
                    아직 완료한 일이 없어요
                </div>

                <div id="today-done-card" class="mt-4 hidden">
                    <div id="today-done-list" class="space-y-3"></div>
                </div>
            </section>

            <!-- 하단 여유 -->
            <div class="h-10"></div>
        </div>

    </div>

    <!-- ✅ today.js는 base.html에서 로드되므로 여기서는 로드하지 않음 -->
</div>

<!-- src/main/resources/templates/pages/task/today.html -->
<div th:fragment="content">

    <div id="today-page"
         class="app-page"
         th:attr="data-date=${date}">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    Today
                </div>

                <div id="todayDateText"
                     class="app-page-subtitle"
                     th:text="${date}">2026-01-31</div>
            </div>

            <div id="today-count"
                 class="app-pill hidden">
            </div>
        </div>

        <div class="app-scroll">

            <form id="todayQuickForm"
                  style="display:grid;grid-template-columns:minmax(0,1fr) 56px;gap:8px;align-items:center;"
                  autocomplete="off">
                <input id="todayQuickTitle"
                       type="text"
                       maxlength="30"
                       class="app-input min-w-0 flex-1 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none"
                       placeholder="생각난 할 일을 바로 기록" />
                <button id="todayQuickSubmit"
                        type="submit"
                        style="display:block;background:#2563eb;color:#fff;border-radius:8px;min-width:56px;"
                        class="app-primary-btn px-4 py-3 text-[14px] disabled:opacity-50">
                    기록
                </button>
            </form>

            <!-- 로딩 / 에러 -->
            <div id="today-loading"
                 class="mt-6 text-gray-500 text-sm">
                불러오는 중...
            </div>

            <div id="today-error"
                 class="mt-6 text-red-600 text-sm hidden"></div>

            <!-- Empty State -->
            <div id="today-empty"
                 class="hidden mt-16 flex flex-col items-center justify-center text-center select-none">
                <div class="w-14 h-14 rounded-lg bg-white border border-slate-200
                      flex items-center justify-center shadow-sm text-slate-500">
                    <span class="text-2xl">✓</span>
                </div>

                <div class="mt-5 text-2xl font-extrabold text-gray-800">
                    오늘 할 일이 없어요
                </div>

                <div class="mt-3 text-base text-gray-500 font-semibold">
                    아래 기록함에서 오늘 할 일을 골라보세요
                </div>
            </div>

            <!-- ✅ 리스트 카드 (today.js가 제어) -->
            <div id="today-card" class="mt-6 hidden">
                <div id="today-list" class="space-y-3"></div>
            </div>

            <section class="app-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">아직 고르지 않은 일</div>
                        <div class="app-section-subtitle">기록해둔 일 중 오늘 할 일을 골라요</div>
                    </div>
                    <div id="today-inbox-count"
                         class="app-pill app-pill-blue">
                        0개
                    </div>
                </div>

                <div id="today-inbox-empty"
                     class="app-empty mt-4">
                    기록함이 비어 있어요
                </div>

                <div id="today-inbox-card" class="mt-4 hidden">
                    <div id="today-inbox-list" class="space-y-4"></div>
                </div>
            </section>

            <section class="app-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">오늘 완료한 일</div>
                        <div class="app-section-subtitle">완료하면 여기에 쌓여요</div>
                    </div>
                    <div id="today-done-count"
                         class="app-pill app-pill-green">
                        0개
                    </div>
                </div>

                <div id="today-done-empty"
                     class="app-empty mt-4">
                    아직 완료한 일이 없어요
                </div>

                <div id="today-done-card" class="mt-4 hidden">
                    <div id="today-done-list" class="space-y-3"></div>
                </div>
            </section>

            <!-- 하단 여유 -->
            <div class="h-10"></div>
        </div>

    </div>

    <!-- ✅ today.js는 base.html에서 로드되므로 여기서는 로드하지 않음 -->
</div>

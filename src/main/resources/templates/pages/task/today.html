<!-- src/main/resources/templates/pages/task/today.html -->
<div th:fragment="content">

    <div id="today-page"
         class="app-page"
         th:attr="data-date=${date}">

        <div class="app-page-header">
            <div>
                <div class="app-page-title">
                    Today
                </div>

                <div id="todayDateText"
                     class="app-page-subtitle"
                     th:text="${date}">2026-01-31</div>
            </div>

            <div id="today-count"
                 class="app-pill hidden">
            </div>
        </div>

        <div class="app-scroll">

            <form id="todayQuickForm"
                  class="quick-capture-form"
                  autocomplete="off">
                <input id="todayQuickTitle"
                       type="text"
                       maxlength="30"
                       class="app-input min-w-0 flex-1 bg-white px-4 py-3 text-[15px] font-semibold text-gray-900 outline-none"
                       placeholder="생각난 할 일을 바로 기록" />
                <button id="todayQuickSubmit"
                        type="submit"
                        class="app-primary-btn quick-capture-submit disabled:opacity-50">
                    기록
                </button>
            </form>

            <section class="today-summary-grid" aria-label="Today 요약">
                <div class="today-summary-item">
                    <div class="today-summary-label">오늘 할 일</div>
                    <div id="today-summary-today" class="today-summary-value">0</div>
                </div>
                <div class="today-summary-item">
                    <div class="today-summary-label">기록함</div>
                    <div id="today-summary-inbox" class="today-summary-value">0</div>
                </div>
                <div class="today-summary-item">
                    <div class="today-summary-label">완료</div>
                    <div id="today-summary-done" class="today-summary-value">0</div>
                </div>
            </section>

            <!-- 로딩 / 에러 -->
            <div id="today-loading"
                 class="mt-6 text-gray-500 text-sm">
                불러오는 중...
            </div>

            <div id="today-error"
                 class="mt-6 text-red-600 text-sm hidden"></div>

            <section id="today-overdue-section"
                     class="app-section today-overdue-section hidden"
                     aria-labelledby="today-overdue-title">
                <div class="app-section-header">
                    <div>
                        <div id="today-overdue-title"
                             class="app-section-title">지난 미완료</div>
                        <div class="app-section-subtitle">놓친 일을 확인하고 다시 정리해요</div>
                    </div>
                    <div id="today-overdue-count"
                         class="app-pill today-overdue-count">
                        0개
                    </div>
                </div>

                <div id="today-overdue-list"
                     class="mt-4 space-y-3"></div>
            </section>

            <!-- Empty State -->
            <div id="today-empty"
                 class="today-empty-state hidden">
                <div class="today-empty-icon">
                    ✓
                </div>

                <div class="today-empty-title">
                    오늘 할 일이 없어요
                </div>

                <div class="today-empty-copy">
                    새로 기록하거나 아래 기록함에서 오늘 할 일을 골라보세요
                </div>
            </div>

            <!-- ✅ 리스트 카드 (today.js가 제어) -->
            <div id="today-card" class="mt-6 hidden">
                <div id="today-list" class="space-y-3"></div>
            </div>

            <section class="app-section today-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">아직 고르지 않은 일</div>
                        <div class="app-section-subtitle">기록해둔 일 중 오늘 할 일을 골라요</div>
                    </div>
                    <div id="today-inbox-count"
                         class="app-pill app-pill-blue">
                        0개
                    </div>
                </div>

                <div id="today-inbox-empty"
                     class="app-empty mt-4">
                    기록함이 비어 있어요
                </div>

                <div id="today-inbox-card" class="mt-4 hidden">
                    <div id="today-inbox-list" class="space-y-4"></div>
                </div>
            </section>

            <section class="app-section today-section">
                <div class="app-section-header">
                    <div>
                        <div class="app-section-title">오늘 완료한 일</div>
                        <div class="app-section-subtitle">완료하면 여기에 쌓여요</div>
                    </div>
                    <div id="today-done-count"
                         class="app-pill app-pill-green">
                        0개
                    </div>
                </div>

                <div id="today-done-empty"
                     class="app-empty mt-4">
                    아직 완료한 일이 없어요
                </div>

                <div id="today-done-card" class="mt-4 hidden">
                    <div id="today-done-list" class="space-y-3"></div>
                </div>
            </section>

            <!-- 하단 여유 -->
            <div class="h-10"></div>
        </div>

    </div>

    <!-- ✅ today.js는 base.html에서 로드되므로 여기서는 로드하지 않음 -->
</div>

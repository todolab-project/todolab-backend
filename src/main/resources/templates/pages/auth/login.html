<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body class="app-body min-h-screen">
<main class="min-h-screen flex items-center justify-center px-5 py-10">
    <section class="w-full max-w-sm">
        <div class="mb-8">
            <h1 class="text-3xl font-black text-slate-900">ToDoLab</h1>
            <p class="mt-2 text-sm font-bold text-slate-500">오늘 할 일을 정리하려면 로그인하세요.</p>
        </div>

        <form class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"
              th:action="@{/login}"
              method="post">
            <input th:if="${_csrf != null}"
                   type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div th:if="${param.error}"
                 class="mb-4 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm font-bold text-red-700">
                이메일 또는 비밀번호가 올바르지 않습니다.
            </div>

            <div th:if="${param.logout}"
                 class="mb-4 rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-bold text-emerald-700">
                로그아웃되었습니다.
            </div>

            <label class="block text-sm font-black text-slate-700" for="username">이메일</label>
            <input id="username"
                   name="username"
                   type="email"
                   autocomplete="username"
                   required
                   class="mt-2 h-12 w-full rounded-md border border-slate-300 px-3 text-base font-bold text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">

            <label class="mt-4 block text-sm font-black text-slate-700" for="password">비밀번호</label>
            <input id="password"
                   name="password"
                   type="password"
                   autocomplete="current-password"
                   required
                   class="mt-2 h-12 w-full rounded-md border border-slate-300 px-3 text-base font-bold text-slate-900 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">

            <button type="submit"
                    class="mt-6 h-12 w-full rounded-md bg-blue-600 text-base font-black text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-200">
                로그인
            </button>
        </form>
    </section>
</main>
</body>
</html>
